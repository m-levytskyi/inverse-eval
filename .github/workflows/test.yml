name: ReflecTorch Pipeline Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pipenv'  # Cache pipenv dependencies
        
    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv
        
    - name: Install dependencies
      run: |
        pipenv install --dev
        
    - name: Check data availability
      run: |
        echo "Checking for test data..."
        if [ -d "data/test_data" ]; then
          echo "✓ Test data directory found"
          ls -la data/test_data/
        else
          echo "⚠️  Test data directory not found"
        fi
        
    - name: Run ReflecTorch inference test
      run: |
        pipenv run python test_single_experiment.py
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test_results/
          *.log
        retention-days: 30
