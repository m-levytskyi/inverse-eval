# s000004 Configuration for ReflecTorch Inference Pipeline
# Sample s000004: Single layer (deposited_layer) structure
# Layer parameters from MARIA dataset analysis:
# - Fronting SLD: 3.5e-06 Å⁻², Roughness: 8.04 Å
# - Layer1 SLD: 3.56709e-06 Å⁻², Thickness: 28.63 Å, Roughness: 7.04 Å  
# - Backing SLD: 9.79867e-06 Å⁻²

general:
  name: s000004_reconstruction
  root_dir: null
  
dset:
  cls: ReflectivityDataLoader
  prior_sampler:
    cls: SubpriorParametricSampler
    kwargs:
      param_ranges:
        thicknesses: [20., 50.] # Focused around experimental value of 28.63 Å
        roughnesses: [5., 15.]  # Focused around experimental values 7-8 Å
        slds: [3.0, 11.0]      # Range covering fronting, layer, and backing SLDs
      bound_width_ranges:
        thicknesses: [1.0e-2, 30.]
        roughnesses: [1.0e-2, 10.]
        slds: [1.0e-2, 2.]
      model_name: standard_model
      max_num_layers: 1 # Single layer structure for s000004
      constrained_roughness: false
      max_thickness_share: 0.8
      logdist: false
      scale_params_by_ranges: false
      scaled_range: [-1., 1.]
      device: 'cuda'
      
  q_generator:
    cls: ConstantQ
    kwargs:
      q: [0.007, 0.3, 78] # Matched to experimental Q range and exact point count
      device: 'cuda'
      
  intensity_noise:
    cls: BasicExpIntensityNoise
    kwargs:
      relative_errors: [0.0, 0.0] # No additional noise for inference
      abs_errors: 0.0
      consistent_rel_err: true
      logdist: false
      apply_shift: false
      shift_range: [0.0, 0.0]
      apply_scaling: false
      scale_range: [0.0, 0.0]
      apply_background: false
      background_range: [0.0, 0.0]

  q_noise:
    cls: BasicQNoiseGenerator
    kwargs:
      shift_std: 0.0
      noise_std: [0.0, 0.0]
      
  curves_scaler:
    cls: LogAffineCurvesScaler
    kwargs:
      weight: 0.2
      bias: 1.0
      eps: 1.0e-6

model:
  network:
    cls: NetworkWithPriorsConvEmb
    pretrained_name: null
    device: 'cuda'
    kwargs:
      in_channels: 1
      hidden_channels: [32, 64, 128, 256, 512]
      dim_embedding: 128
      dim_avpool: 1
      embedding_net_activation: 'gelu'
      use_batch_norm: true
      dim_out: 5 # 1-layer model: thickness, roughness_front, roughness_back, sld_layer, sld_backing
      layer_width: 512
      num_blocks: 6
      repeats_per_block: 2
      mlp_activation: 'gelu'
      dropout_rate: 0.0 
      pretrained_embedding_net: null
       
training:
  num_iterations: 10000
  batch_size: 1024
  lr: 1.0e-4
  grad_accumulation_steps: 1
  clip_grad_norm_max: null
  train_with_q_input: False
  update_tqdm_freq: 1
  optimizer: AdamW
  trainer_kwargs:
    optim_kwargs:
      betas: [0.9, 0.999]
      weight_decay: 0.0005
  callbacks:
    save_best_model:
      enable: true
      freq: 500
    lr_scheduler:
      cls: StepLR
      kwargs:
        step_size: 500
        gamma: 0.5
  logger:
    use_neptune: false
