# Baseline NF configuration sweep for theoretical curves
# Smoke-test config: 20 experiments on dataset/test

prior_deviations: [30]
sld_modes: ["none"]
prominent_features: [false]
priors_type: "constraint_based"

inference_backend: "nf"
nf_config_name: "example_nf_config_reflectorch.yaml"
nf_num_samples: 1000
nf_disable_importance_sampling: false
use_sigmas_as_input: false
use_theoretical: true

num_experiments: 20
layer_count: 1
data_directory: "dataset/test"

sweep_results_dir: "sweep_results_nf_baseline_theoretical_test"
