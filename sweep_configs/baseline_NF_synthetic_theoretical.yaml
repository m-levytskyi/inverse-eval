# Baseline NF configuration sweep for denoised curves treated as theoretical
# Uses 2-column (Q, R) curves from denoised_as_theoretical_q

prior_deviations: [30]
sld_modes: ["none"]
prominent_features: [false]
priors_type: "constraint_based"

inference_backend: "nf"
nf_config_name: "example_nf_config_reflectorch.yaml"
nf_num_samples: 1000
nf_disable_importance_sampling: false
use_sigmas_as_input: false
use_theoretical: true

num_experiments: null
layer_count: 1
data_directory: "vendor/nflows_reflectorch/dataset/synthetic_inference_test"

sweep_results_dir: "sweep_results_nf_baseline_synthetic_theoretical"